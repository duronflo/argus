services:
  argus:
    image: ghcr.io/duronflo/argus:latest
    container_name: argus
    ports:
      - "3000:3000"
    volumes:
      # Persist the SQLite database across container restarts and updates.
      # Only the data directory is mounted – server code stays inside the image
      # so that updates via Watchtower take effect immediately on restart.
      - argus-data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_PATH=/app/data/data.db
    restart: unless-stopped
    labels:
      # Watchtower uses this label to identify containers it should manage
      - "com.centurylinklabs.watchtower.enable=true"

  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    # Poll every 5 minutes for new image digests
    command: --interval 300 --label-enable
    restart: unless-stopped

volumes:
  argus-data:
